instructions = <html><h2>Como usar esta aplicaçăo</h2><ol><li>Jogue Star Citizen, em LIVE, em inglęs</li><li>Quando chegar a um quiosque de mercadorias, interaja com ele<ul><li>Para garantir bons resultados, consulte as<b>boas práticas</b></li></ul></li><li>No menu suspenso ŕ esquerda \u201COs seus inventários\u201D, selecione a loja</li><li>Para o separador<code>Comprar</code>:<ol><li>Prima<kbd>F3</kbd></li><li>Deslize e repita para capturar todas as listagens</li></ol></li><li>Mude para o separador<code>Vender</code> e repita</li><li>Repita ao longo da sua sessăo de jogo</li><li>Feche a aplicaçăo (certifique-se de que a fecha na área de notificaçăo)</li></ol><h3>Boas práticas</h3><ul><li>Alinhe o seu personagem<strong>o mais perto e o mais direito possível</strong>do ecră</li><li>Desative as dicas (\u201COptions > Game settings > Show Hints, Control Hints\u201D)</li><li>Desative o chat global (<kbd>F12</kbd> por predefiniçăo)</li><li>Se usar<code>r_DisplayInfo</code>, certifique-se de que o texto năo interfere com o ecră</li><li>Tente minimizar os reflexos posicionando o seu personagem ou ajustando \u201CGamma\u201D, \u201CBrilho\u201D e \u201CContraste\u201D nas opçőes de \u201CGráficos\u201D</li></ul></html>

