instructions = <html><h2>Como usar este aplicativo</h2><ol><li>Jogue Star Citizen, no LIVE, em inglęs</li><li>Quando chegar a um terminal de mercadorias, interaja com ele<ul><li>Para melhores resultados, confira as<b>boas práticas</b></li></ul></li><li>No menu suspenso \u201CSeus inventários\u201D ŕ esquerda, selecione a loja</li><li>Para a aba<code>Comprar</code>:<ol><li>Pressione<kbd>F3</kbd></li><li>Role a tela e repita para capturar todas as listagens</li></ol></li><li>Vá para a aba<code>Vender</code>e repita</li><li>Repita durante toda a sua sessăo de jogo</li><li>Feche o aplicativo (certifique-se de fechá-lo pela bandeja do sistema)</li></ol><h3>Boas práticas</h3><ul><li>Alinhe seu personagem<strong>o mais próximo e reto possível</strong>em relaçăo ŕ tela</li><li>Desative as dicas (\u201COpçőes > Configuraçőes do jogo > Mostrar dicas, Dicas de controle\u201D)</li><li>Desative o chat global (<kbd>F12</kbd> por padrăo)</li><li>Se vocę usa<code>r_DisplayInfo</code>, certifique-se de que o texto năo interfira na tela</li><li>Tente minimizar reflexos posicionando seu personagem ou ajustando \u201CGamma\u201D, \u201CBrilho\u201D e \u201CContraste\u201D nas opçőes de \u201CGráficos\u201D</li></ul></html>
