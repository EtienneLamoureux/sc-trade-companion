usageTitle = How to use this app
usageCommonTipsTitle = Common tips
usageCommonTips = Play Star Citizen on LIVE and keep the game in English.\nAlign your character as close and as straight to the screen as possible.\nTurn off hints (Options > Game settings > Show Hints, Control Hints).\nTurn off global chat (F12 by default).\nIf you use r_DisplayInfo, make sure the text does not intrude on the screen.\nTry to minimize glare by adjusting your position or the Gamma, Brightness and Contrast graphics settings.\nClose the companion from the system tray when you are done.
usageCommodityTitle = Commodity terminals
usageCommoditySteps = 1. Interact with a commodity kiosk.\n2. In the left "Your inventories" dropdown, select the shop.\n3. Open the Buy tab and press F3.\n4. Scroll and repeat until every listing has been captured.\n5. Switch to the Sell tab and repeat.\n6. Repeat throughout your play session.
usageCommodityGoodExample = <b>Good example:</b> centered terminal, clean edges, and no overlays covering the prices or shop selector.
usageCommodityBadExample = <b>Bad example:</b> angled capture, cropped edges, glare, or HUD elements covering the terminal content.
usageItemTitle = Item terminals
usageItemSteps = 1. Interact with an item kiosk.\n2. In the left "Choose destination" dropdown, select the shop.\n3. Press F5 to capture the current page.\n4. Scroll or change page and repeat until every listing has been captured.\n5. Repeat throughout your play session.
usageItemGoodExample = <b>Good example:</b> centered kiosk, readable item rows, and the destination selector fully visible.
usageItemBadExample = <b>Bad example:</b> camera tilt, truncated listing rows, glare, or overlays hiding the destination selector or item names.
