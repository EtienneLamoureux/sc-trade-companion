instructions = <html><h2>Comment utiliser cette application</h2><ol><li>Lancez Star Citizen, en LIVE, en anglais</li><li>Lorsque vous arrivez à un terminal de marchandises, interagissez avec<ul><li>Pour de meilleurs résultats, consultez les<b>bonnes pratiques</b></li></ul></li><li>Dans le menu déroulant « Vos inventaires » à gauche, sélectionnez la boutique</li><li>Pour l\u2019onglet<code>Acheter</code> :<ol><li>Appuyez sur<kbd>F3</kbd></li><li>Faites défiler et répétez afin de capturer toutes les entrées</li></ol></li><li>Passez à l\u2019onglet<code>Vendre</code>et répétez</li><li>Répétez pendant toute votre session de jeu</li><li>Fermez l\u2019application (assurez-vous de la fermer depuis la barre système)</li></ol><h3>Bonnes pratiques</h3><ul><li>Alignez votre personnage<strong>le plus près et le plus droit possible</strong>face à l\u2019écran</li><li>Désactivez les aides (« Options > Paramètres du jeu > Afficher les aides, Aides de contrôle »)</li><li>Désactivez le chat global (<kbd>F12</kbd> par défaut)</li><li>Si vous utilisez<code>r_DisplayInfo</code>, assurez-vous que le texte n\u2019empiète pas sur l\u2019écran</li><li>Essayez de minimiser les reflets en positionnant votre personnage ou en ajustant « Gamma », « Luminosité » et « Contraste » dans les options « Graphiques »</li></ul></html>
