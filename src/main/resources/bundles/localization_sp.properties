tabUsage = Uso

instructions = <html><h2>Cómo usar esta aplicación</h2><ol><li>Juega Star Citizen en LIVE y en inglés</li><li>Cuando llegues a un quiosco de mercancías, interactúa con él<ul><li>Para garantizar buenos resultados, consulta las<b>buenas prácticas</b></li></ul></li><li>En el menú desplegable izquierdo «Tus inventarios», selecciona la tienda</li><li>Para la pestańa<code>Comprar</code>:<ol><li>Pulsa<kbd>F3</kbd></li><li>Desplázate y repite para capturar todas las listas</li></ol></li><li>Cambia a la pestańa<code>Vender</code> y repite</li><li>Repite durante toda tu sesión de juego</li><li>Cierra la aplicación (asegúrate de cerrarla desde la bandeja del sistema)</li></ol><h3>Buenas prácticas</h3><ul><li>Alinea tu personaje<strong>lo más cerca y recto posible</strong> frente a la pantalla</li><li>Desactiva las ayudas («Options > Game settings > Show Hints, Control Hints»)</li><li>Desactiva el chat global (<kbd>F12</kbd> por defecto)</li><li>Si usas<code>r_DisplayInfo</code>, asegúrate de que el texto no invada la pantalla</li><li>Intenta minimizar los reflejos colocando tu personaje o ajustando «Gamma», «Brillo» y «Contraste» en las opciones de «Gráficos»</li></ul></html>

