instructions = <html><h2>So verwendest du diese Anwendung</h2><ol><li>Starte Star Citizen im LIVE-Modus auf Englisch</li><li>Wenn du an einem Waren-Terminal bist, interagiere damit<ul><li>Für beste Ergebnisse beachte die<b>Best Practices</b></li></ul></li><li>Wähle im linken Dropdown \u201EDeine Inventare\u201C den Shop aus</li><li>Für den Tab<code>Kaufen</code>:<ol><li>Drücke<kbd>F3</kbd></li><li>Scrolle und wiederhole dies, um alle Einträge zu erfassen</li></ol></li><li>Wechsle zum Tab<code>Verkaufen</code>und wiederhole den Vorgang</li><li>Wiederhole dies während deiner gesamten Spielsitzung</li><li>Schließe die Anwendung (stelle sicher, dass du sie über den Infobereich beendest)</li></ol><h3>Best Practices</h3><ul><li>Richte deinen Charakter<strong>so nah und gerade wie möglich</strong>auf den Bildschirm aus</li><li>Deaktiviere Hinweise (\u201EOptionen > Spieleinstellungen > Hinweise anzeigen, Steuerungshinweise\u201C)</li><li>Deaktiviere den globalen Chat (<kbd>F12</kbd> standardmäßig)</li><li>Wenn du<code>r_DisplayInfo</code> verwendest, stelle sicher, dass der Text nicht den Bildschirm überlagert</li><li>Versuche Spiegelungen zu minimieren, indem du deinen Charakter positionierst oder \u201EGamma\u201C, \u201EHelligkeit\u201C und \u201EKontrast\u201C in den \u201EGrafik\u201C-Optionen anpasst</li></ul></html>
