instructions = <html><h2>So verwenden Sie diese Anwendung</h2><ol><li>Starten Sie Star Citizen auf LIVE und auf Englisch</li><li>Wenn Sie an einem Warenkiosk sind, interagieren Sie damit<ul><li>Fï¿½r beste Ergebnisse beachten Sie die<b>Best Practices</b></li></ul></li><li>Wï¿½hlen Sie im linken Dropdown \u201EIhre Inventare\u201C den Shop aus</li><li>Fï¿½r den<code>Kaufen</code>-Tab:<ol><li>Drï¿½cken Sie<kbd>F3</kbd></li><li>Scrollen und wiederholen Sie den Vorgang, um alle Eintrï¿½ge zu erfassen</li></ol></li><li>Wechseln Sie zum<code>Verkaufen</code>-Tab und wiederholen Sie den Vorgang</li><li>Wiederholen Sie dies wï¿½hrend Ihrer gesamten Spielsitzung</li><li>Schlieï¿½en Sie die Anwendung (stellen Sie sicher, dass Sie sie im Infobereich vollstï¿½ndig beenden)</li></ol><h3>Best Practices</h3><ul><li>Richten Sie Ihren Charakter<strong>so nah und so gerade wie mï¿½glich</strong>vor dem Bildschirm aus</li><li>Deaktivieren Sie Hinweise (\u201EOptionen > Spieleinstellungen > Hinweise anzeigen, Steuerungshinweise\u201C)</li><li>Deaktivieren Sie den globalen Chat (<kbd>F12</kbd> standardmï¿½ï¿½ig)</li><li>Wenn Sie<code>r_DisplayInfo</code>verwenden, stellen Sie sicher, dass der Text den Bildschirm nicht ï¿½berdeckt</li><li>Versuchen Sie Blendung zu minimieren, indem Sie Ihren Charakter positionieren oder \u201EGamma\u201C, \u201EHelligkeit\u201C und \u201EKontrast\u201C in den \u201EGrafik\u201C-Optionen anpassen</li></ul></html>

